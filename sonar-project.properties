sonar.projectKey=Notes-App---Abdul-Baseer
sonar.projectName=Notes App - Abdul Baseer
sonar.projectVersion=1.0.0

sonar.sources=backend/src,frontend/src

sonar.tests=backend/tests,frontend/src

sonar.exclusions=**/node_modules/**,**/coverage/**,**/build/**,**/dist/**,**/.env,**/tests/**,**/*.test.js,**/*.test.jsx

sonar.test.inclusions=**/*.test.js,**/*.test.jsx

sonar.javascript.lcov.reportPaths=backend/coverage/lcov.info,frontend/coverage/lcov.info

sonar.sourceEncoding=UTF-8
sonar.host.url=http://localhost:9000
sonar.token=${SONAR_TOKEN}

# Coverage thresholds for new code
sonar.newCodeDefinitionType=PREVIOUS_VERSION

# JavaScript language properties
sonar.javascript.file.suffixes=.js,.jsx,.ts,.tsx

# Ensure files are properly recognized
sonar.javascript.environments=browser,node

# Test execution settings
sonar.coverage.exclusions=**/node_modules/**,**/tests/**,**/*.test.js,**/*.test.jsx,**/jest.setup.js,**/setupTests.js